<stop offset="0" stop-color="#EAFBFB"/>
<stop offset="1" stop-color="#CFEFF1"/>
</linearGradient>
<linearGradient id="phone" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#2A3236"/>
<stop offset="1" stop-color="#0E1416"/>
</linearGradient>
<linearGradient id="capG2" x1="0" y1="0" x2="0" y2="1">
