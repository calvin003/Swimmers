<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Swimmers device on phone with app</title>
<desc>The Swimmers scope clipped to a smartphone, screen showing a live microscope view of moving sperm and result metrics.</desc>
