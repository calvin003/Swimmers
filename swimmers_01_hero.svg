<svg width="100%" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Swimmers hero device render</title>
<desc>Product render of the Swimmers clip-on smartphone sperm-analysis scope, teal and white, with lens and wordmark.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#EAFBFB"/>
<stop offset="1" stop-color="#CFEFF1"/>
</linearGradient>
<linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#FFFFFF"/>
<stop offset="0.55" stop-color="#F4FAFB"/>
<stop offset="1" stop-color="#DCEAEC"/>
</linearGradient>
<linearGradient id="capG" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#2BC2CE"/>
<stop offset="0.5" stop-color="#12A0AE"/>
<stop offset="1" stop-color="#0C7E8A"/>
</linearGradient>
<radialGradient id="lensG" cx="0.4" cy="0.35" r="0.8">
<stop offset="0" stop-color="#7FE9F2"/>
<stop offset="0.45" stop-color="#0E6B86"/>
<stop offset="1" stop-color="#04303E"/>
</radialGradient>
<radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
<stop offset="0" stop-color="#46E0EC" stop-opacity="0.9"/>
<stop offset="1" stop-color="#46E0EC" stop-opacity="0"/>
</radialGradient>
<linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#F4FCFD"/>
<stop offset="0.5" stop-color="#9DCBD2"/>
<stop offset="1" stop-color="#5C8E96"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="680" height="500" rx="20" fill="url(#bg)"/>

<text x="340" y="62" text-anchor="middle" font-family="Verdana, sans-serif" font-size="15" letter-spacing="3" fill="#0C7E8A">MEET YOUR SWIMMERS</text>

<ellipse cx="340" cy="408" rx="186" ry="30" fill="#0C5763" opacity="0.16"/>
<ellipse cx="340" cy="408" rx="120" ry="18" fill="#0C5763" opacity="0.18"/>

<rect x="196" y="150" width="288" height="232" rx="56" fill="url(#bodyG)" stroke="#C7DDE0" stroke-width="1.5"/>

<path d="M196 206 V206 C196 175 221 150 252 150 H428 C459 150 484 175 484 206 V214 H196 Z" fill="url(#capG)"/>
<rect x="196" y="206" width="288" height="9" fill="#0A6E79" opacity="0.35"/>

<circle cx="340" cy="186" r="58" fill="url(#glow)"/>
<circle cx="340" cy="186" r="44" fill="url(#ring)"/>
<circle cx="340" cy="186" r="37" fill="#0A2E37"/>
<circle cx="340" cy="186" r="34" fill="url(#lensG)"/>
<ellipse cx="328" cy="172" rx="13" ry="9" fill="#CFF6FB" opacity="0.55"/>

<rect x="232" y="252" width="216" height="2.5" rx="1" fill="#CFE2E5"/>

<g>
<circle cx="262" cy="300" r="9" fill="#0C7E8A"/>
<path d="M254 300 q-12 -9 -22 -2 q12 5 22 2 Z" fill="#0C7E8A"/>
<text x="282" y="308" font-family="Verdana, sans-serif" font-weight="bold" font-size="30" letter-spacing="0.5" fill="#0C7E8A">swimmers</text>
</g>

<text x="340" y="344" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12.5" letter-spacing="2" fill="#5C8E96">AT-HOME SPERM TEST</text>

<rect x="470" y="250" width="22" height="60" rx="6" fill="#0A2E37" opacity="0.85"/>
<rect x="474" y="256" width="14" height="48" rx="4" fill="#103E48"/>

<circle cx="232" cy="186" r="5" fill="#46E0EC"/>

<rect x="214" y="168" width="120" height="120" rx="44" fill="#FFFFFF" opacity="0.18"/>
